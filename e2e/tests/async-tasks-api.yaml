name: 异步任务 API 测试
description: 验证 /api/admin/async-tasks 的完整查询功能

variables:
  baseUrl: "http://localhost:18083"
  adminKey: "e2e-test-key"

cases:
  - name: 列出所有任务（带 success 字段）
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 200
      body:
        success: true
        tasks: { exists: true }
        limit: { gt: 0 }

  - name: 按 status=PENDING 筛选
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks?status=PENDING"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 200
      body:
        success: true

  - name: 按 status=DONE 筛选
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks?status=DONE"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 200
      body:
        success: true

  - name: 按 status=FAILED 筛选
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks?status=FAILED"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 200
      body:
        success: true

  - name: 按不存在的 bot_key 筛选返回空列表
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks?bot_key=definitely-nonexistent-bot-xyz"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 200
      body:
        success: true
        tasks:
          length: 0

  - name: limit=3 分页参数有效
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks?limit=3&offset=0"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 200
      body:
        limit: 3

  - name: 超过最大 limit(100) 返回验证错误
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks?limit=200"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 422

  - name: 查询不存在的 task_id 返回 404
    request:
      method: GET
      url: "{{baseUrl}}/api/admin/async-tasks/nonexistent-task-id-xyz-12345"
      headers:
        X-Admin-Key: "{{adminKey}}"
    expect:
      status: 404
