version: "1"

project:
  name: as-dispatch-async
  description: "as-dispatch 异步消息流 E2E 测试"
  version: "1.0.0"

# 纯测试模式 — as-dispatch 已在外部启动（localhost:18083）
# 变量在各测试文件的 variables 节中直接定义

mocks:
  # Mock Agent 服务：模拟 AgentStudio A2A 端点
  agent-server:
    port: 19090
    routes:
      - method: POST
        path: /api/a2a/test-agent/messages
        response:
          status: 200
          headers:
            Content-Type: text/event-stream
          body: "data: {\"type\":\"message\",\"role\":\"assistant\",\"content\":\"Hello from mock agent!\"}\n\ndata: {\"type\":\"message_stop\"}\n\n"
      - method: POST
        path: /api/a2a/slow-agent/messages
        delay: 5000
        response:
          status: 200
          headers:
            Content-Type: text/event-stream
          body: "data: {\"type\":\"message\",\"role\":\"assistant\",\"content\":\"Slow response\"}\n\ndata: {\"type\":\"message_stop\"}\n\n"

  # Mock Webhook Receiver：模拟企微机器人 webhook 接收器（接收 as-dispatch 回复）
  webhook-receiver:
    port: 19091
    routes:
      - method: POST
        path: /webhook/reply
        response:
          status: 200
          body:
            errcode: 0
            errmsg: ok

tests:
  suites:
    - name: 服务健康检查
      id: health
      file: tests/health.yaml

    - name: 管理 API 鉴权
      id: admin-auth
      file: tests/admin-auth.yaml

    - name: Bot 配置 API（异步字段）
      id: bot-config
      file: tests/bot-config.yaml

    - name: 异步任务 API
      id: async-tasks
      file: tests/async-tasks.yaml

    - name: 异步模式快速 ACK
      id: async-ack
      file: tests/async-ack.yaml

    - name: 向后兼容验证
      id: backward-compat
      file: tests/backward-compat.yaml
